name: Smoke test

on:
  pull_request:
    branches:
      - main

env:
  REGISTRY: quay.io
  ORG: trustyai_testing
  IMAGE_NAME: llama-stack-trustyai-fms

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
        PR_NUMBER: ${{ github.event.pull_request.number || 'default-pr-number' }}
    steps:
      - name: Check labels
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: "ok-to-test, lgtm, approved"

      - name: Checkout
        uses: actions/checkout@v2

      - name: Create kind config
        run: |
          cat > kind-config.yaml << EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".registry]
              config_path = "/etc/containerd/certs.d"
          nodes:
          - role: control-plane
            kubeadmConfigPatches:
            - |
              kind: InitConfiguration
              nodeRegistration:
                kubeletExtraArgs:
                  system-reserved: memory=500Mi
                  eviction-hard: memory.available<200Mi
            extraPortMappings:
            - containerPort: 80
              hostPort: 80
              protocol: TCP
            - containerPort: 443
              hostPort: 443
              protocol: TCP
          EOF

      - name: Create k8s Kind Cluster
        id: kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          registry: true
          registry_name: kind-registry
          registry_port: 5000
          registry_enable_delete: true
          config: kind-config.yaml
      #- name: Log in to Container Registry
      #  uses: redhat-actions/podman-login@v1
      #  with:
      #    registry: ${{ env.REGISTRY }}
      #    username: ${{ secrets.QUAY_USERNAME }}
      #    password: ${{ secrets.QUAY_PASSWORD }}

      - name: Apply CRDs
        run: |
          kubectl apply -f tests/kind/crds/route_crd.yaml

      - name: Clone llama-stack-k8s-operator
        run: |
          git clone https://github.com/opendatahub-io/llama-stack-k8s-operator.git
          cd llama-stack-k8s-operator
          git checkout odh

      - name: Deploy llama-stack-k8s-operator
        run: |
          cd llama-stack-k8s-operator
          make deploy IMG=quay.io/opendatahub/llama-stack-k8s-operator:latest
          
          # Wait for operator deployment to be ready
          if ! kubectl wait --for=condition=available --timeout=300s deployment/llama-stack-k8s-operator-controller-manager -n llama-stack-k8s-operator-system; then
            echo "Deployment failed to become ready. Debugging information:"
            kubectl describe deployment llama-stack-k8s-operator-controller-manager -n llama-stack-k8s-operator-system
            kubectl logs -l control-plane=controller-manager -n llama-stack-k8s-operator-system --tail=100
            kubectl get events -n llama-stack-k8s-operator-system --sort-by='.lastTimestamp'
            exit 1
          fi

      - name: Pull and tag distribution image for kind
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:main-${{ github.event.pull_request.head.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:main-${{ github.event.pull_request.head.sha }} kind-registry:5000/llama-stack-trustyai-fms:latest
          docker push kind-registry:5000/llama-stack-trustyai-fms:latest

      #- name: Run smoke tests
      #  run: ./tests/smoke/test_smoke.sh

      #- name: Get logs
      #  if: ${{ always() }}
